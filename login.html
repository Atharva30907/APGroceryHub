<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - AP GroceryHub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container header-content">
      <div class="logo">AP Grocery<span>Hub</span></div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="cart.html">Cart</a>
      </nav>
    </div>
  </header>

  <section class="container form-page">
    <div class="form-container">
      <h2 class="form-title">Login to AP GroceryHub</h2>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required />
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="rememberMe" />
            Remember me
          </label>
        </div>
        <button type="submit" class="form-submit">Login</button>
        <div class="form-footer">
          Don’t have an account? <a href="signup.html">Sign up</a>
          <br />
          <a href="javascript:void(0)">Forgot password?</a>
        </div>
      </form>
    </div>
  </section>

  <footer>
    <div class="container footer-content">
      <div class="footer-col">
        <h4>AP GroceryHub</h4>
        <ul>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Careers</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>Support</h4>
        <ul>
          <li><a href="#">Help Center</a></li>
          <li><a href="#">Terms & Conditions</a></li>
          <li><a href="#">Privacy Policy</a></li>
        </ul>
      </div>
    </div>
    <div class="container footer-bottom">
      &copy; 2026 AP GroceryHub. All rights reserved.
    </div>
  </footer>

  <script>
    // Same helpers as in signup.html
    function loadUsers() {
      const saved = localStorage.getItem("users");
      if (!saved) return [];
      return JSON.parse(saved);
    }

    function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      if (!email || !password) {
        alert("Please fill all fields.");
        return;
      }

      const users = loadUsers();

      // Check if user exists in “users JSON”
      const user = users.find(u => u.email === email);

      if (!user) {
        alert("User not found. Please sign up first.");
        return;
      }

      // Verify password (in real app this would be hashed)
      if (user.password !== password) {
        alert("Invalid password.");
        return;
      }

      // Login success
      localStorage.setItem("isAuthenticated", "true");
      localStorage.setItem("userId", user.id.toString());
      localStorage.setItem("userName", user.name);
      localStorage.setItem("userEmail", user.email);

      alert(`Welcome, ${user.name}!`);
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
